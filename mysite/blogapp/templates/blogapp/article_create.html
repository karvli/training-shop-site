{% extends "base.html" %}

{% block title %}
    Create Article
{% endblock %}

{% block body %}
    <h1>Create a new Article</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Create</button>
    </form>

    <p>
        <a href="{% url 'blogapp:articles' %}">Back to article list</a>
    </p>
{% endblock %}

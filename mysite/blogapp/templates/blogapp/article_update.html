{% extends "base.html" %}

{% block title %}
    Update Article #{{ object.pk }}
{% endblock %}

{% block body %}
    <h1>Update Article #{{ object.pk }}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Update</button>
    </form>

    <p>
        <a href="{% url 'blogapp:articles' %}">Back to article list</a>
    </p>
{% endblock %}

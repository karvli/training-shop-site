{% extends "base.html" %}

{% block title %}
    Create Order
{% endblock %}

{% block body %}
    <h1>Create a new Order</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Create</button>
    </form>

    <p>
        <a href="{% url 'shopapp:orders_list' %}">Back to orders list</a>
    </p>
{% endblock %}

{% extends "base.html" %}

{% block title %}
    Create Product
{% endblock %}

{% block body %}
    <h1>Create a new Product</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Create</button>
    </form>

    <p>
        <a href="{% url 'shopapp:products_list' %}">Back to products list</a>
    </p>
{% endblock %}
